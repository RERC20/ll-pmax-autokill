name: Daily Product Count (start + end of day)

# Records how many ACTIVE products the store STARTS and ENDS each day, and pushes each as its
# own dated Telegram message. Also diffs start->end to show how many were PUBLISHED vs KILLED.
# Shopify keeps no such history, so this is our own permanent record (kept in the private Actions
# cache, never committed — same privacy model as the kill engine's kills_log).
#
# TIMING (UK): start ~00:11 (12:01 AM + ~10 min latency buffer), end ~23:49 (11:59 PM - ~10 min).
# The mode is auto-resolved from the UK clock (hour < 12 = start, else end), and every action is
# idempotent-by-UK-date, so an extra/late trigger can never double-send.
#
# PRIMARY trigger = external cron (cron-job.org, Europe/London, DST-correct) hitting the
# workflow_dispatch API at 00:11 and 23:49 with inputs.mode = start / end (punctual).
# BACKUP trigger  = GitHub's own schedule below (best-effort, set for BST / summer).
#   >> DST NOTE: the two schedule lines are UTC and tuned for BST (UTC+1). When the UK falls back
#      to GMT (late Oct), shift both by +1h (11 23 -> 11 0, 49 22 -> 49 23) OR just rely on
#      cron-job.org, which handles DST automatically. Auto-mode + idempotency keep it safe either way.

on:
  # PRIMARY: one DEDICATED cron-job.org job hits this via repository_dispatch with the unique
  # event type "daily-product-count" -- a different mechanism + name from the kill engine's
  # workflow_dispatch, so the two cron jobs can never be confused or overlap. The single job
  # fires at BOTH 00:11 and 23:49 (Europe/London); mode auto-resolves from the UK clock.
  repository_dispatch:
    types: [daily-product-count]
  # manual / gh-cli runs (pick a mode, or leave auto)
  workflow_dispatch:
    inputs:
      mode:
        description: 'start | end | auto'
        required: false
        default: 'auto'
        type: choice
        options: [auto, start, end]
  # BACKUP only: GitHub's own schedule (best-effort, set for BST). Cannot overlap the kill engine
  # (that workflow has no schedule). Safe to leave on; the dedicated cron above is the punctual one.
  schedule:
    - cron: '11 23 * * *'   # 00:11 BST  -> START of day (backup)
    - cron: '49 22 * * *'   # 23:49 BST  -> END of day   (backup)

permissions:
  contents: read            # never commits back; state lives in the private cache

concurrency:
  group: daily-product-count
  cancel-in-progress: false

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the rolling count state + history from the PRIVATE cache (not committed, not web-visible).
      - name: Restore count state
        uses: actions/cache/restore@v4
        with:
          path: |
            _product_count_state.json
            _product_count_history.csv
          key: product-count-${{ github.run_id }}
          restore-keys: |
            product-count-

      - name: Record product count
        env:
          SHOPIFY_STORE:         ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID:     ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SUMMARY_BOT_TOKEN: ${{ secrets.TELEGRAM_SUMMARY_BOT_TOKEN }}
          TELEGRAM_SUMMARY_CHAT_ID:   ${{ secrets.TELEGRAM_SUMMARY_CHAT_ID }}
          GOOGLE_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CUSTOMER_ID:     ${{ secrets.GOOGLE_CUSTOMER_ID }}
        run: python daily_product_count.py --mode ${{ github.event.inputs.mode || 'auto' }}

      - name: Save count state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            _product_count_state.json
            _product_count_history.csv
          key: product-count-${{ github.run_id }}
