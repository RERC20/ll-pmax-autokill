name: Daily Product Count (start + end of day)

# Records how many ACTIVE products the store STARTS and ENDS each day, and pushes each as its
# own dated Telegram message. Also diffs start->end to show how many were PUBLISHED vs KILLED.
# Shopify keeps no such history, so this is our own permanent record (kept in the private Actions
# cache, never committed — same privacy model as the kill engine's kills_log).
#
# TIMING (UK): a single ROLLOVER just after midnight (00:11). It sends YESTERDAY's END + PNL
# (numbers now settled -- Google ad spend for a still-live day isn't final until the day closes)
# AND today's START, in one run. The 00:49 grid tick repeats it as a free idempotent RETRY if the
# 00:11 run was dropped by a GitHub runner blip. Every action is idempotent-by-UK-date, so an
# extra/late/retry trigger can never double-send.
#
# PRIMARY trigger = external cron (cron-job.org, Europe/London, DST-correct). Its grid still hits
# this at 00:11/00:49/23:11/23:49; the script now acts ONLY on the morning ticks (rollover) and
# skips the rest -- so NOTHING needs changing on cron-job.org.
# BACKUP trigger  = GitHub's own schedule below (best-effort, set for BST / summer).
#   >> DST NOTE: the schedule line is UTC, tuned for BST (UTC+1). In GMT (late Oct) shift it
#      (11 23 -> 11 0) OR just rely on cron-job.org, which handles DST automatically.

on:
  # PRIMARY: one DEDICATED cron-job.org job hits this via repository_dispatch with the unique
  # event type "daily-product-count" -- a different mechanism + name from the kill engine's
  # workflow_dispatch, so the two cron jobs can never be confused or overlap. Its grid fires
  # 00:11/00:49/23:11/23:49 (Europe/London); the script acts only on the morning ticks (rollover).
  repository_dispatch:
    types: [daily-product-count]
  # manual / gh-cli runs (pick a mode, or leave auto)
  workflow_dispatch:
    inputs:
      mode:
        description: 'start | end | rollover | auto'
        required: false
        default: 'auto'
        type: choice
        options: [auto, rollover, start, end]
  # BACKUP only: GitHub's own schedule (best-effort, set for BST). Cannot overlap the kill engine
  # (that workflow has no schedule). Safe to leave on; the dedicated cron above is the punctual one.
  schedule:
    - cron: '11 23 * * *'   # 00:11 BST  -> ROLLOVER (yesterday END+PNL, today START) — backup only

permissions:
  contents: read            # never commits back; state lives in the private cache

concurrency:
  group: daily-product-count
  cancel-in-progress: false

jobs:
  count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the rolling count state + history from the PRIVATE cache (not committed, not web-visible).
      - name: Restore count state
        uses: actions/cache/restore@v4
        with:
          path: |
            _product_count_state.json
            _product_count_history.csv
          key: product-count-${{ github.run_id }}
          restore-keys: |
            product-count-

      - name: Record product count
        env:
          SHOPIFY_STORE:         ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID:     ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SUMMARY_BOT_TOKEN: ${{ secrets.TELEGRAM_SUMMARY_BOT_TOKEN }}
          TELEGRAM_SUMMARY_CHAT_ID:   ${{ secrets.TELEGRAM_SUMMARY_CHAT_ID }}
          GOOGLE_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CUSTOMER_ID:     ${{ secrets.GOOGLE_CUSTOMER_ID }}
        run: python daily_product_count.py --mode ${{ github.event.inputs.mode || 'auto' }}

      - name: Save count state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            _product_count_state.json
            _product_count_history.csv
          key: product-count-${{ github.run_id }}
