name: PMax Auto-Kill (every 8 min)

# Runs kill_engine_google_auto.py on GitHub's servers (no laptop/VM needed).
# Drafts losing products, sends a Telegram message every run + a Resend email digest every 12h.
#
# PRIVACY: this repo is PUBLIC only so Actions minutes are free & unlimited. The CODE is public;
# your API creds are NOT -- they live in encrypted repo Secrets (never in the code, masked in logs,
# never handed to forks). Run logs (product ids + spend/revenue) are kept OUT of the repo and
# persisted privately via Actions cache, so nothing business-sensitive is ever committed publicly.

on:
  # Fires ONLY via workflow_dispatch — an external cron (cron-job.org) hits the dispatch API every
  # 8 min, which fires reliably. GitHub's own `schedule` was REMOVED: it's best-effort and dropped
  # ~70% of runs, and keeping it would double-fire alongside the external trigger.
  workflow_dispatch: {}

permissions:
  contents: read                 # read-only -- we no longer commit anything back to the repo

concurrency:
  group: auto-kill               # never let two runs overlap
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the rolling kills history (used by the 12h email digest) from a PRIVATE Actions
      # cache -- not committed to the repo, not web-visible. restore-keys grabs the newest saved copy.
      - name: Restore kills history
        uses: actions/cache/restore@v4
        with:
          path: kills_log_auto.csv
          key: kills-log-${{ github.run_id }}
          restore-keys: |
            kills-log-

      - name: Run the auto-kill engine
        env:
          GOOGLE_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_DEVELOPER_TOKEN }}
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CUSTOMER_ID:     ${{ secrets.GOOGLE_CUSTOMER_ID }}
          SHOPIFY_STORE:          ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_CLIENT_ID:      ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET:  ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          RESEND_API_KEY:         ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python kill_engine_google_auto.py

      # Save the updated kills history back to the PRIVATE cache for the next run.
      - name: Save kills history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: kills_log_auto.csv
          key: kills-log-${{ github.run_id }}
